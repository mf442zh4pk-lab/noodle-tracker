                  <div style={{ width: 28, height: 28, borderRadius: "50%", background: u.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0 }}>{u.avatar}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                      <span style={{ fontSize: 11, fontWeight: "bold", color: theme.textDark }}>{uid === userId ? "You" : u.name}</span>
                      <span style={{ fontSize: 11, color: theme.textLight }}>{Math.round((count/totalContrib)*100)}% ({count} logs)</span>
                    </div>
                    <div style={{ height: 10, background: theme.tabBg, borderRadius: 5, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${(count/totalContrib)*100}%`, background: u.color, borderRadius: 5 }} />
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </>)}

        {/* ── WEIGHT ── */}
        {section === "weight" && (<>
          <div style={{ background: theme.cardBg, borderRadius: 14, padding: "14px", marginBottom: 14, border: `1.5px solid ${theme.border}` }}>
            <div style={{ fontSize: 12, fontWeight: "bold", color: theme.textDark, marginBottom: 12 }}>Log weight</div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <input
                value={weightInput}
                onChange={e => setWeightInput(e.target.value)}
                placeholder="e.g. 4.2"
                type="number"
                step="0.1"
                style={{ flex: 1, padding: "9px 13px", borderRadius: 10, border: `1.5px solid ${theme.border}`, fontFamily: "Georgia, serif", fontSize: 14, background: theme.bodyBg }}
              />
              <span style={{ fontSize: 12, color: theme.textMid }}>lbs</span>
              <button onClick={() => {
                const w = parseFloat(weightInput);
                if (isNaN(w) || w <= 0) return;
                const entry = { id: Date.now(), weight: w, date: new Date().toISOString(), by: userId, byName: userName };
                const base = shared || {};
                const next = { ...base, weights: [...(Array.isArray(base.weights) ? base.weights : []), entry] };
                setWeightInput("");
                // trigger save via window event
                window._saveShared && window._saveShared(next);
              }} style={{ background: theme.accent, color: "#fff", border: "none", borderRadius: 10, padding: "9px 16px", cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 13, fontWeight: "bold" }}>
                Log
              </button>
            </div>
          </div>

          {weights.length === 0 ? (
            <div style={{ textAlign: "center", padding: "40px 20px", color: theme.textLight }}>
              <div style={{ fontSize: 36, marginBottom: 8 }}>⚖️</div>
              <div style={{ fontSize: 13 }}>No weight entries yet. Log Noodle's weight above to start tracking her growth!</div>
            </div>
          ) : (<>
            {/* Growth chart */}
            <div style={{ background: theme.cardBg, borderRadius: 14, padding: "14px", marginBottom: 14, border: `1.5px solid ${theme.border}` }}>
              <div style={{ fontSize: 12, fontWeight: "bold", color: theme.textDark, marginBottom: 4 }}>Weight over time</div>
              <div style={{ fontSize: 11, color: theme.textLight, marginBottom: 10 }}>
                {weights[0]?.weight} lbs → {weights[weights.length-1]?.weight} lbs
                {weights.length >= 2 && <span style={{ color: "#7cb87c", marginLeft: 6 }}>+{(weights[weights.length-1].weight - weights[0].weight).toFixed(1)} lbs gained</span>}
              </div>
              {(() => {
                const minW = Math.min(...weights.map(w => w.weight));
                const maxW = Math.max(...weights.map(w => w.weight));
                const range = maxW - minW || 1;
                return (
                  <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height: BAR_H }}>
                    {weights.map((w, i) => (
                      <div key={w.id} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end", height: "100%" }}>
                        <div style={{ fontSize: 8, color: theme.textLight, marginBottom: 2 }}>{w.weight}</div>
                        <div style={{ width: "100%", background: "#7cb87c", borderRadius: 3, height: Math.max(4, ((w.weight - minW) / range) * (BAR_H - 16) + 4) }} />
                      </div>
                    ))}
                  </div>
                );
              })()}
            </div>

            {/* Weight log */}
            <div style={{ background: theme.cardBg, borderRadius: 14, padding: "14px", border: `1.5px solid ${theme.border}` }}>
              <div style={{ fontSize: 12, fontWeight: "bold", color: theme.textDark, marginBottom: 10 }}>History</div>
              {[...weights].reverse().map((w, i) => (
                <div key={w.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderBottom: i < weights.length-1 ? `1px solid ${theme.border}` : "none" }}>
                  <div>
                    <span style={{ fontSize: 16, fontWeight: "bold", color: theme.textDark }}>{w.weight} lbs</span>
                    {i < weights.length-1 && (() => {
                      const prev = [...weights].reverse()[i+1];
                      const diff = (w.weight - prev.weight).toFixed(1);
                      return <span style={{ fontSize: 10, color: parseFloat(diff) >= 0 ? "#7cb87c" : "#e87c7c", marginLeft: 6 }}>{parseFloat(diff) >= 0 ? "+" : ""}{diff}</span>;
                    })()}
                  </div>
                  <div style={{ fontSize: 10, color: theme.textLight }}>{new Date(w.date).toLocaleDateString("en-US", { month: "short", day: "numeric" })} · {w.byName}</div>
                </div>
              ))}
            </div>
          </>)}
        </>)}

        {/* ── MILESTONES ── */}
        {section === "milestones" && (
          <MilestonesSection shared={shared} userId={userId} userName={userName} theme={theme} />
        )}

        <div style={{ height: 32 }} />
      </div>
    </div>
  );
}

// -- GALLERY VIEW -------------------------------------------------------------
function GalleryView({ shared, userId, userName, theme, onAddPhoto, onDeletePhoto, onUpdateCaption }) {
  const gallery = Array.isArray(shared?.gallery) ? shared.gallery : [];
  const [editingCaption, setEditingCaption] = useState(null);
  const [captionText, setCaptionText] = useState("");
  const [confirmDeletePhoto, setConfirmDeletePhoto] = useState(null);
  const [lightbox, setLightbox] = useState(null);

  return (
    <div style={{ padding: "16px 14px", maxWidth: 600, margin: "0 auto" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div style={{ fontSize: 18, fontWeight: "bold", color: theme.textDark }}>Noodle's Gallery</div>
        <label style={{ background: theme.accent, color: "#fff", borderRadius: 12, padding: "8px 16px", cursor: "pointer", fontSize: 13, fontFamily: "Georgia, serif", fontWeight: "bold", display: "inline-block" }}>
          + Add Photo
          <input type="file" accept="image/*" style={{ display: "none" }} onChange={e => e.target.files[0] && onAddPhoto(e.target.files[0])} />
        </label>
      </div>

      {gallery.length === 0 && (
        <div style={{ textAlign: "center", padding: "60px 20px", color: theme.textLight }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>📸</div>
          <div style={{ fontSize: 15, marginBottom: 6 }}>No photos yet</div>
          <div style={{ fontSize: 12 }}>Tap + Add Photo to start Noodle's gallery</div>
        </div>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        {gallery.map((photo) => (
          <div key={photo.id} style={{ borderRadius: 12, overflow: "hidden", background: theme.cardBg, border: `1.5px solid ${theme.border}`, boxShadow: "0 1px 6px rgba(0,0,0,0.07)" }}>
            <div style={{ position: "relative", paddingBottom: "100%", background: "#f0f0f0" }}>
              <img src={photo.src} alt={photo.caption || "Noodle"} onClick={() => setLightbox(photo)} style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", objectFit: "cover", cursor: "pointer" }} />
            </div>
            <div style={{ padding: "8px 10px" }}>
              {editingCaption === photo.id ? (
                <div style={{ display: "flex", gap: 5 }}>
                  <input value={captionText} onChange={e => setCaptionText(e.target.value)} onKeyDown={e => e.key === "Enter" && (onUpdateCaption(photo.id, captionText), setEditingCaption(null))} placeholder="Add caption..." autoFocus style={{ flex: 1, padding: "4px 7px", borderRadius: 6, border: `1px solid ${theme.border}`, fontFamily: "Georgia, serif", fontSize: 11, background: theme.bodyBg }} />
                  <button onClick={() => { onUpdateCaption(photo.id, captionText); setEditingCaption(null); }} style={{ background: theme.accent, color: "#fff", border: "none", borderRadius: 6, padding: "4px 8px", cursor: "pointer", fontSize: 13 }}>v</button>
                </div>
              ) : (
                <div style={{ fontSize: 11, color: photo.caption ? theme.textDark : theme.textLight, cursor: "pointer", marginBottom: 4 }} onClick={() => { setEditingCaption(photo.id); setCaptionText(photo.caption || ""); }}>
                  {photo.caption || "Tap to add caption"}
                </div>
              )}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ fontSize: 9, color: theme.textLight }}>{photo.addedByName} · {new Date(photo.date).toLocaleDateString("en-US", { month: "short", day: "numeric" })}</div>
                {confirmDeletePhoto === photo.id ? (
                  <div style={{ display: "flex", gap: 4 }}>
                    <button onClick={() => { onDeletePhoto(photo.id); setConfirmDeletePhoto(null); }} style={{ background: "#e87c7c", color: "#fff", border: "none", borderRadius: 5, padding: "2px 7px", cursor: "pointer", fontSize: 10 }}>Delete</button>
                    <button onClick={() => setConfirmDeletePhoto(null)} style={{ background: theme.tabBg, border: "none", borderRadius: 5, padding: "2px 7px", cursor: "pointer", fontSize: 10 }}>Cancel</button>
                  </div>
                ) : (
                  <button onClick={() => setConfirmDeletePhoto(photo.id)} style={{ background: "none", border: "none", color: theme.textLight, cursor: "pointer", fontSize: 14 }}>x</button>
                )}
              </div>
            </div>
          </div>
        ))}
      </div>

      {lightbox && (
        <div onClick={() => setLightbox(null)} style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.92)", zIndex: 9999, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <img src={lightbox.src} alt={lightbox.caption || "Noodle"} style={{ maxWidth: "100%", maxHeight: "80vh", borderRadius: 12, objectFit: "contain" }} />
          {lightbox.caption && <div style={{ color: "#fff", marginTop: 12, fontSize: 14, textAlign: "center" }}>{lightbox.caption}</div>}
          <div style={{ color: "rgba(255,255,255,0.5)", marginTop: 8, fontSize: 11 }}>Tap anywhere to close</div>
        </div>
      )}
      <div style={{ height: 32 }} />
    </div>
  );
}

// -- APP -----------------------------------------------------------------------
function App() {
  const savedId     = ls(LS_ID);
  const savedName   = ls(LS_NAME);
  const savedColor  = ls(LS_COLOR)  || USER_COLORS[0];
  const savedAvatar = ls(LS_AVATAR) || USER_AVATARS[0];

  const [userId,    setUserId]    = useState(savedId   || null);
  const [userName,  setUserName]  = useState(savedName || "");
  const [userColor, setUserColor] = useState(savedColor);
  const [setupDone, setSetupDone] = useState(!!(savedId && savedName));
  const [nameInput, setNameInput] = useState("");

  const [shared,  setShared]  = useState(null);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);

  const [view,        setView]        = useState("today");
  const [activePhase, setActivePhase] = useState(() => getPhaseForAge(getNoodleAge(new Date()).months));
  const [calMonth,    setCalMonth]    = useState(() => { const d = new Date(); return { year: d.getFullYear(), month: d.getMonth() }; });
  const [selectedDay, setSelectedDay] = useState(null);
  const [dayPhase,    setDayPhase]    = useState(() => getPhaseForAge(getNoodleAge(new Date()).months));
  const [tipIdx,      setTipIdx]      = useState(0);
  const [dogNameInput,setDogNameInput]= useState("Noodle");
  const [editDogName, setEditDogName] = useState(false);
  const [editNameInput,setEditNameInput] = useState("");
  const [themeKey,    setThemeKey]    = useState(() => ls(LS_THEME) || "dachshund");
  const [profilePhoto, setProfilePhoto] = useState(null); // base64 header photo

  const theme = THEMES[themeKey] || THEMES.dachshund;
  const PHASES = getPhases(theme);

  // Expose persist for analytics components that can't receive it as prop easily
  useEffect(() => { window._saveShared = (next) => { setShared(next); persist(next); }; }, [persist]);

  const changeTheme = (key) => {
    setThemeKey(key);
    lsSet(LS_THEME, key);
  };

  // Tips rotation
  useEffect(() => {
    const t = setInterval(() => setTipIdx((tipI) => (tipI + 1) % TIPS.length), 5000);
    return () => clearInterval(t);
  }, []);

  // Subscribe to Firebase in real-time
  useEffect(() => {
    setLoading(true);
    const unsub = subscribeToData((data) => {
      if (data) {
        setShared(data);
        if (data.dogName) setDogNameInput(data.dogName);
        if (data.profilePhoto) setProfilePhoto(data.profilePhoto);
      } else {
        setShared({ users: {}, completions: {}, notes: {}, dogName: "Noodle" });
      }
      setLoading(false);
    });
    return () => unsub();
  }, []);

  // Re-register returning user in shared state
  useEffect(() => {
    if (!setupDone || !userId || !shared) return;
    if (!shared.users?.[userId]) {
      const next = { ...shared, users: { ...(shared.users || {}), [userId]: { name: userName, color: userColor, avatar: savedAvatar, lastSeen: new Date().toISOString() } } };
      setShared(next);
      saveData(next).catch(console.error);
    }
  }, [shared, setupDone]);

  const getBase = () => shared || { users: {}, completions: {}, notes: {}, dogName: dogNameInput };

  const persist = useCallback((next) => {
    setSyncing(true);
    saveData(next).catch(console.error).finally(() => setSyncing(false));
  }, []);

  // -- SETUP ----------------------------------------------------------------
  const handleSetup = async () => {
    const name = nameInput.trim();
    if (!name) return;
    const id       = `user_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`;
    const colorIdx = Object.keys(shared?.users || {}).length % USER_COLORS.length;
    const color    = USER_COLORS[colorIdx];
    const avatar   = USER_AVATARS[colorIdx];
    setUserId(id); setUserName(name); setUserColor(color); setSetupDone(true);
    lsSet(LS_ID, id); lsSet(LS_NAME, name); lsSet(LS_COLOR, color); lsSet(LS_AVATAR, avatar);
    const base = getBase();
    const next = { ...base, users: { ...(base.users || {}), [id]: { name, color, avatar, lastSeen: new Date().toISOString() } } };
    setShared(next);
    await saveData(next);
  };

  // -- ACTIONS ---------------------------------------------------------------
  const handleToggleTask = useCallback((taskId, ds) => {
    const base = getBase();
    const key  = `${taskId}_${ds}_${userId}`;
    const next = { ...base, completions: { ...(base.completions || {}), [key]: !(base.completions || {})[key] }, users: { ...(base.users || {}), [userId]: { ...(base.users || {})[userId], lastSeen: new Date().toISOString() } } };
    setShared(next); persist(next);
  }, [shared, userId]);

  const handleSaveMeal = useCallback((taskId, mealIdx, ds, time) => {
    const base = getBase();
    const key = mealKey(taskId, mealIdx, ds, userId);
    const newCompletions = { ...(base.completions || {}) };
    if (time === null) {
      delete newCompletions[key];
    } else {
      newCompletions[key] = { time: time || "", by: userId };
    }
    const next = { ...base, completions: newCompletions, users: { ...(base.users || {}), [userId]: { ...(base.users || {})[userId], lastSeen: new Date().toISOString() } } };
    setShared(next); persist(next);
  }, [shared, userId]);

  const handleSaveNote = useCallback((taskId, text) => {
    const base = getBase();
    const next = { ...base, notes: { ...(base.notes || {}), [taskId]: { text, by: userId, byName: userName } } };
    setShared(next); persist(next);
  }, [shared, userId, userName]);

  const handleSavePotty = useCallback((taskId, slotIdx, ds, data) => {
    const base = getBase();
    const key = pottyKey(taskId, slotIdx, ds, userId);
    const newCompletions = { ...(base.completions || {}) };
    if (data === null) {
      delete newCompletions[key];
    } else {
      // data is either { time, types } or a legacy string/bool
      const time  = (data && typeof data === "object") ? (data.time  || "") : "";
      const types = (data && typeof data === "object" && Array.isArray(data.types)) ? data.types : [];
      // Store types as keyed object so Firebase preserves it (arrays get dropped)
      const typesObj = {};
      types.forEach((t, i) => { typesObj[i] = t; });
      newCompletions[key] = { time, types: typesObj, by: userId };
    }
    const next = {
      ...base,
      completions: newCompletions,
      users: { ...(base.users || {}), [userId]: { ...(base.users || {})[userId], lastSeen: new Date().toISOString() } }
    };
    setShared(next); persist(next);
  }, [shared, userId]);

  const handleChangeName = () => {
    const name = editNameInput.trim();
    if (!name) return;
    setUserName(name); lsSet(LS_NAME, name);
    const base = getBase();
    const next = { ...base, users: { ...(base.users || {}), [userId]: { ...(base.users || {})[userId], name, lastSeen: new Date().toISOString() } } };
    setShared(next); persist(next); setEditNameInput("");
  };

  const readFileAsBase64 = (file) => new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => res(e.target.result);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });

  const handleSetProfilePhoto = async (file) => {
    if (!file) return;
    const b64 = await readFileAsBase64(file);
    setProfilePhoto(b64);
    const next = { ...getBase(), profilePhoto: b64 };
    setShared(next); persist(next);
  };

  const handleAddGalleryPhoto = async (file) => {
    if (!file) return;
    const b64 = await readFileAsBase64(file);
    const base = getBase();
    const gallery = Array.isArray(base.gallery) ? base.gallery : [];
    const newPhoto = { id: Date.now(), src: b64, caption: "", addedBy: userId, addedByName: userName, date: new Date().toISOString() };
    const next = { ...base, gallery: [...gallery, newPhoto] };
    setShared(next); persist(next);
  };

  const handleDeleteGalleryPhoto = (photoId) => {
    const base = getBase();
    const gallery = (Array.isArray(base.gallery) ? base.gallery : []).filter(p => p.id !== photoId);
    const next = { ...base, gallery };
    setShared(next); persist(next);
  };

  const handleUpdateCaption = (photoId, caption) => {
    const base = getBase();
    const gallery = (Array.isArray(base.gallery) ? base.gallery : []).map(p => p.id === photoId ? { ...p, caption } : p);
    const next = { ...base, gallery };
    setShared(next); persist(next);
  };

  const saveDogName = () => {
    const name = dogNameInput.trim() || "Noodle";
    setDogNameInput(name); setEditDogName(false);
    const next = { ...getBase(), dogName: name };
    setShared(next); persist(next);
  };

  // -- DERIVED ---------------------------------------------------------------
  const allUsers    = Object.entries(shared?.users || {});
  const dogName     = dogNameInput || "Noodle";
  const comp        = shared?.completions || {};
  const users       = shared?.users || {};

  const phaseProgress = (phase, ds) => {
    if (!allUsers.length) return 0;
    const vis = phase.tasks.filter((t) => shouldShow(t, ds));
    if (!vis.length) return 0;
    const done = vis.filter((t) => {
      if (t.category === "Feeding") return isFeedingDone(comp, users, t.id, phase.id, ds);
      if (t.category === "Potty") return countPottyDone(comp, users, t.id, ds) > 0;
      return allUsers.some(([uid]) => isChecked(comp, t.id, ds, uid));
    }).length;
    return Math.round((done / vis.length) * 100);
  };

  const dayRatio = (ds) => {
    if (!allUsers.length) return 0;
    const vis = PHASES.flatMap((ph) => ph.tasks.filter((t) => shouldShow(t, ds)));
    if (!vis.length) return 0;
    const done = vis.filter((t) => { const ph = PHASES.find((p) => p.tasks.includes(t)); 
      if (t.category === "Feeding") return isFeedingDone(comp, users, t.id, ph?.id, ds);
      if (t.category === "Potty") return countPottyDone(comp, users, t.id, ds) > 0;
      return allUsers.some(([uid]) => isChecked(comp, t.id, ds, uid)); }).length;
    return done / vis.length;
  };

  const tlProps = { shared, userId, userColor, userName, allUsers, syncing, PHASES, onToggleTask: handleToggleTask, onSaveMeal: handleSaveMeal, onSaveNote: handleSaveNote, onSavePotty: handleSavePotty };

  // -- SETUP SCREEN ----------------------------------------------------------
  if (!setupDone) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg,#3d2b1f 0%,#5c3d2a 60%,#7a5c3a 100%)", fontFamily: "Georgia, serif", padding: 24 }}>
        <div style={{ fontSize: 64, marginBottom: 16 }}>🐾</div>
        <h1 style={{ color: "#fdf6ec", fontSize: 24, margin: "0 0 6px", textAlign: "center" }}>Noodle Puppy Tracker</h1>
        <p style={{ color: "#c4a477", margin: "0 0 32px", fontSize: 14, textAlign: "center" }}>Shared with your co-parent -- real-time sync!</p>
        {loading ? <div style={{ color: "#c4a477" }}>Loading...</div> : (
          <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 20, padding: "28px 24px", width: "100%", maxWidth: 340, border: "1px solid rgba(255,255,255,0.15)" }}>
            {Object.values(shared?.users || {}).length > 0 && (
              <div style={{ marginBottom: 20 }}>
                <div style={{ color: "#c4a477", fontSize: 11, letterSpacing: "1px", textTransform: "uppercase", marginBottom: 8 }}>Already joined</div>
                {Object.values(shared.users).map((u) => (
                  <div key={u.name} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                    <span style={{ fontSize: 20 }}>{u.avatar}</span>
                    <span style={{ color: "#fdf6ec", fontSize: 14 }}>{u.name}</span>
                    <div style={{ width: 8, height: 8, borderRadius: "50%", background: u.color, marginLeft: "auto" }} />
                  </div>
                ))}
              </div>
            )}
            <div style={{ color: "#c4a477", fontSize: 11, letterSpacing: "1px", textTransform: "uppercase", marginBottom: 8 }}>Your name</div>
            <input value={nameInput} onChange={(e) => setNameInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && handleSetup()} placeholder="e.g. Mom, Dad, Alex..." autoFocus style={{ width: "100%", padding: "10px 14px", borderRadius: 12, border: "none", fontFamily: "Georgia, serif", fontSize: 15, background: "rgba(255,255,255,0.12)", color: "#fdf6ec", outline: "none", boxSizing: "border-box", marginBottom: 16 }} />
            <button onClick={handleSetup} disabled={!nameInput.trim()} style={{ width: "100%", padding: "12px", borderRadius: 12, border: "none", background: nameInput.trim() ? "#e8845c" : "rgba(255,255,255,0.1)", color: "#fff", cursor: nameInput.trim() ? "pointer" : "default", fontFamily: "Georgia, serif", fontSize: 15, fontWeight: "bold" }}>Join Tracker &#8594;</button>
          </div>
        )}
      </div>
    );
  }

  // -- MAIN UI ---------------------------------------------------------------
  const today = new Date();
  const tStr  = dateKey(today);
  const curPhase   = PHASES.find((p) => p.id === activePhase);
  const firstDay   = new Date(calMonth.year, calMonth.month, 1).getDay();
  const daysInMonth = new Date(calMonth.year, calMonth.month + 1, 0).getDate();

  // Age & phase tracking
  const noodleAge = getNoodleAge(today);
  const autoPhaseId = getPhaseForAge(noodleAge.months);
  const autoPhase = PHASES.find(p => p.id === autoPhaseId);
  const phaseInfo = getPhaseProgress(NOODLE_BIRTHDAY, today);
  const isNewPhase = activePhase !== autoPhaseId;

  return (
    <div style={{ minHeight: "100vh", background: theme.pageBg, fontFamily: "Georgia, serif" }}>

      {/* HEADER */}
      <div style={{ background: theme.header, padding: "18px 18px 13px", textAlign: "center" }}>
        <div style={{ fontSize: 32, marginBottom: 2 }}>🐾</div>

        {/* Profile photo */}
        {profilePhoto && (
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 8 }}>
            <div style={{ width: 70, height: 70, borderRadius: "50%", overflow: "hidden", border: "3px solid rgba(255,255,255,0.4)", boxShadow: "0 2px 12px rgba(0,0,0,0.3)" }}>
              <img src={profilePhoto} alt="Noodle" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
            </div>
          </div>
        )}
        {editDogName ? (
          <div style={{ display: "flex", justifyContent: "center", gap: 7, marginBottom: 3, flexWrap: "wrap" }}>
            <input value={dogNameInput} onChange={(e) => setDogNameInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") saveDogName(); if (e.key === "Escape") setEditDogName(false); }} placeholder="Puppy's name" style={{ padding: "8px 14px", borderRadius: 18, border: "2px solid #e8845c", fontFamily: "Georgia, serif", fontSize: 15, background: "#fff8f0", minWidth: 160, outline: "none" }} />
            <button onClick={saveDogName} style={{ background: "#e8845c", color: "#fff", border: "none", borderRadius: 18, padding: "8px 18px", cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 14, fontWeight: "bold" }}>Save</button>
            <button onClick={() => setEditDogName(false)} style={{ background: "rgba(255,255,255,0.15)", color: "#fdf6ec", border: "none", borderRadius: 18, padding: "8px 14px", cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 14 }}>x</button>
          </div>
        ) : (
          <h1 onClick={() => setEditDogName(true)} style={{ color: "#fdf6ec", fontSize: 19, fontWeight: "bold", margin: "0 0 2px", cursor: "pointer" }}>{dogName}'s Journey <span style={{ fontSize: 11, color: "#c4a477" }}>edit</span></h1>
        )}

        {/* Age badge */}
        <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
          <div style={{ background: autoPhase.color, borderRadius: 12, padding: "3px 10px", display: "flex", alignItems: "center", gap: 5 }}>
            <span style={{ fontSize: 14 }}>{autoPhase.emoji}</span>
            <span style={{ color: "#fff", fontSize: 11, fontWeight: "bold" }}>{noodleAge.label}</span>
          </div>
          <div style={{ background: "rgba(255,255,255,0.12)", borderRadius: 12, padding: "3px 10px" }}>
            <span style={{ color: "#c4a477", fontSize: 11 }}>{autoPhase.label} • {phaseInfo.daysLeft}d left</span>
          </div>
        </div>

        {/* Phase progress bar */}
        <div style={{ margin: "0 auto 10px", maxWidth: 260 }}>
          <div style={{ height: 5, background: "rgba(255,255,255,0.15)", borderRadius: 3, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${phaseInfo.pct}%`, background: autoPhase.color, borderRadius: 3, transition: "width 0.5s" }} />
          </div>
          <div style={{ color: "rgba(255,255,255,0.45)", fontSize: 9, marginTop: 3 }}>{phaseInfo.pct}% through {autoPhase.label}</div>
        </div>

        <div style={{ display: "flex", justifyContent: "center", gap: 6, marginBottom: 8, flexWrap: "wrap" }}>
          {allUsers.map(([uid, u]) => (
            <div key={uid} style={{ display: "flex", alignItems: "center", gap: 4, background: "rgba(255,255,255,0.12)", borderRadius: 12, padding: "2px 9px" }}>
              <span style={{ fontSize: 13 }}>{u.avatar}</span>
              <span style={{ color: uid === userId ? userColor : "#c4a477", fontSize: 11, fontWeight: uid === userId ? "bold" : "normal" }}>{uid === userId ? `${u.name} (you)` : u.name}</span>
              <div style={{ width: 6, height: 6, borderRadius: "50%", background: u.color }} />
            </div>
          ))}
        </div>
        <div style={{ fontSize: 11, color: "#fdf6ec", background: "rgba(255,255,255,0.1)", borderRadius: 9, padding: "5px 11px", display: "inline-block" }}>{TIPS[tipIdx]}</div>
      </div>

      {/* Phase transition banner */}
      {isNewPhase && view === "today" && (
        <div style={{ background: autoPhase.color, padding: "10px 16px", display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 20 }}>{autoPhase.emoji}</span>
          <div style={{ flex: 1 }}>
            <div style={{ color: "#fff", fontWeight: "bold", fontSize: 13 }}>Noodle has entered {autoPhase.label}!</div>
            <div style={{ color: "rgba(255,255,255,0.85)", fontSize: 11 }}>New tasks and routines are now active.</div>
          </div>
          <button onClick={() => setActivePhase(autoPhaseId)} style={{ background: "rgba(255,255,255,0.25)", border: "none", borderRadius: 10, padding: "5px 12px", color: "#fff", cursor: "pointer", fontSize: 11, fontWeight: "bold" }}>
            Switch
          </button>
        </div>
      )}

      {/* NAV */}
      <div style={{ display: "flex", background: theme.nav }}>
        {[["today","📋","Today"],["calendar","📅","Calendar"],["gallery","📸","Gallery"],["clues","🔍","Noods Clues"],["account","👤","Account"]].map(([v, icon, label]) => (
          <button key={v} onClick={() => setView(v)} style={{ flex: 1, padding: "8px", background: v === view || (v === "calendar" && view === "day") ? theme.accent : "transparent", color: "#fff", border: "none", cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 11, fontWeight: v === view || (v === "calendar" && view === "day") ? "bold" : "normal", display: "flex", flexDirection: "column", alignItems: "center", gap: 1 }}>
            <span style={{ fontSize: 15 }}>{icon}</span><span>{label}</span>
          </button>
        ))}
      </div>

      {/* TODAY */}
      {view === "today" && (<>
        <div style={{ display: "flex", background: theme.tabBg, overflowX: "auto" }}>
          {PHASES.map((p) => { const prog = phaseProgress(p, tStr); const active = activePhase === p.id; const isCurrent = p.id === autoPhaseId; return (
            <button key={p.id} onClick={() => setActivePhase(p.id)} style={{ flex: 1, minWidth: 86, padding: "8px 4px", background: active ? p.color : "transparent", color: active ? "#fff" : theme.textMid, border: "none", cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 11, fontWeight: active ? "bold" : "normal", borderBottom: active ? `3px solid ${theme.nav}` : "3px solid transparent", position: "relative" }}>
              <div style={{ fontSize: 16 }}>{p.emoji}</div>
              <div>{p.label}{isCurrent && <span style={{ marginLeft: 3, fontSize: 8, background: active ? "rgba(255,255,255,0.3)" : p.color, color: "#fff", borderRadius: 4, padding: "1px 3px" }}>NOW</span>}</div>
              <div style={{ height: 3, background: "rgba(0,0,0,0.1)", borderRadius: 2, margin: "2px 4px 0", overflow: "hidden" }}><div style={{ height: "100%", width: `${prog}%`, background: active ? "rgba(255,255,255,0.8)" : p.color }} /></div>
              <div style={{ fontSize: 9, marginTop: 1, opacity: 0.8 }}>{prog}% today</div>
            </button>
          ); })}
        </div>
        <TaskList dateStr={tStr} phase={curPhase} {...tlProps} />
      </>)}

      {/* CALENDAR */}
      {view === "calendar" && (
        <div style={{ padding: "13px", maxWidth: 600, margin: "0 auto", background: theme.pageBg, minHeight: "100vh" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
            <button onClick={() => setCalMonth((m) => { const d = new Date(m.year, m.month - 1, 1); return { year: d.getFullYear(), month: d.getMonth() }; })} style={{ background: "#e8ddd0", border: "none", borderRadius: 8, padding: "5px 13px", cursor: "pointer", fontSize: 17 }}>{"<"}</button>
            <div style={{ fontWeight: "bold", color: "#3d2b1f", fontSize: 15 }}>{MONTHS[calMonth.month]} {calMonth.year}</div>
            <button onClick={() => setCalMonth((m) => { const d = new Date(m.year, m.month + 1, 1); return { year: d.getFullYear(), month: d.getMonth() }; })} style={{ background: "#e8ddd0", border: "none", borderRadius: 8, padding: "5px 13px", cursor: "pointer", fontSize: 17 }}>{">"}</button>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2, marginBottom: 2 }}>{DAYS.map((d) => <div key={d} style={{ textAlign: "center", fontSize: 10, color: "#9a7a5a", fontWeight: "bold" }}>{d}</div>)}</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2 }}>
            {[...Array(firstDay).fill(null), ...Array.from({ length: daysInMonth }, (_, dayNum) => dayNum + 1)].map((d, calIdx) => {
              if (!d) return <div key={`e${calIdx}`} />;
              const cd = new Date(calMonth.year, calMonth.month, d);
              const ds = dateKey(cd);
              const ratio = dayRatio(ds);
              const isToday = ds === tStr;
              const fut = cd > today;
              let bg = "#fff";
              if (!fut && ratio > 0) bg = ratio >= 0.8 ? "#7cb87c" : ratio >= 0.4 ? "#e8c45c" : "#f0d0c0";
              if (fut) bg = "#f8f4f0";
              return (
                <button key={d} onClick={() => !fut && (setSelectedDay(new Date(calMonth.year, calMonth.month, d)), setDayPhase(activePhase), setView("day"))} style={{ background: bg, border: isToday ? "2px solid #e8845c" : "1.5px solid #e8ddd0", borderRadius: 7, padding: "4px 2px", cursor: fut ? "default" : "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 1, minHeight: 38 }}>
                  <span style={{ fontSize: 11, fontWeight: isToday ? "bold" : "normal", color: isToday ? "#e8845c" : fut ? "#c4b09a" : "#3d2b1f" }}>{d}</span>
                  {!fut && ratio > 0 && <span style={{ fontSize: 8, color: ratio >= 0.8 ? "#fff" : "#7a5c3a", fontWeight: "bold" }}>{Math.round(ratio * 100)}%</span>}
                  {isToday && <span style={{ width: 4, height: 4, borderRadius: "50%", background: "#e8845c", display: "block" }} />}
                </button>
              );
            })}
          </div>
          <div style={{ display: "flex", gap: 9, marginTop: 12, justifyContent: "center", flexWrap: "wrap" }}>
            {[["#7cb87c","80%+ done"],["#e8c45c","40-79%"],["#f0d0c0","< 40%"],["#fff","No activity"]].map(([c, l]) => (
              <div key={l} style={{ display: "flex", alignItems: "center", gap: 4 }}><div style={{ width: 9, height: 9, borderRadius: 3, background: c, border: "1px solid #e8ddd0" }} /><span style={{ fontSize: 10, color: "#7a5c3a" }}>{l}</span></div>
            ))}
          </div>
          <div style={{ height: 24 }} />
        </div>
      )}

      {/* DAY DRILL-DOWN */}
      {view === "day" && selectedDay && (() => {
        const ds = dateKey(selectedDay);
        const isToday = ds === tStr;
        const dayLabel = selectedDay.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
        const dpo = PHASES.find((p) => p.id === dayPhase);
        const totalVis = PHASES.flatMap((ph) => ph.tasks.filter((t) => shouldShow(t, ds)));
        const totalDone = totalVis.filter((t) => { const ph = PHASES.find((p) => p.tasks.includes(t)); 
          if (t.category === "Feeding") return isFeedingDone(comp, users, t.id, ph?.id, ds);
          if (t.category === "Potty") return countPottyDone(comp, users, t.id, ds) > 0;
          return allUsers.some(([uid]) => isChecked(comp, t.id, ds, uid)); }).length;
        return (<>
          <div style={{ background: theme.tabBg, padding: "8px 12px", display: "flex", alignItems: "center", gap: 9, borderBottom: `1px solid ${theme.border}` }}>
            <button onClick={() => setView("calendar")} style={{ background: theme.border, border: "none", borderRadius: 7, padding: "4px 10px", cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12, color: theme.textDark }}>&#8592; Back</button>
            <div style={{ flex: 1 }}><div style={{ fontWeight: "bold", color: "#3d2b1f", fontSize: 13 }}>{dayLabel}</div><div style={{ fontSize: 10, color: "#9a7a5a" }}>{totalDone}/{totalVis.length} tasks done</div></div>
            {isToday && <span style={{ background: "#e8845c", color: "#fff", borderRadius: 7, padding: "2px 7px", fontSize: 10, fontWeight: "bold" }}>Today</span>}
          </div>
          <div style={{ display: "flex", background: theme.tabBg, overflowX: "auto" }}>
            {PHASES.map((p) => { const prog = phaseProgress(p, ds); const active = dayPhase === p.id; return (
              <button key={p.id} onClick={() => setDayPhase(p.id)} style={{ flex: 1, minWidth: 86, padding: "7px 4px", background: active ? p.color : "transparent", color: active ? "#fff" : "#7a5c3a", border: "none", cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 11, fontWeight: active ? "bold" : "normal", borderBottom: active ? "3px solid #3d2b1f" : "3px solid transparent" }}>
                <div style={{ fontSize: 15 }}>{p.emoji}</div><div>{p.label}</div><div style={{ fontSize: 9, marginTop: 1, opacity: 0.85 }}>{prog}% done</div>
              </button>
            ); })}
          </div>
          <TaskList dateStr={ds} phase={dpo} {...tlProps} />
        </>);
      })()}

      {/* ACCOUNT */}
      {view === "account" && (
        <div style={{ padding: "20px 16px", maxWidth: 500, margin: "0 auto" }}>
          <div style={{ background: theme.cardBg, borderRadius: 16, padding: "18px", marginBottom: 16, border: `1.5px solid ${theme.border}` }}>
            <div style={{ fontSize: 11, fontWeight: "bold", letterSpacing: "1.5px", color: theme.textMid, textTransform: "uppercase", marginBottom: 14 }}>Your Profile</div>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
              <div style={{ width: 44, height: 44, borderRadius: "50%", background: userColor, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>{savedAvatar}</div>
              <div><div style={{ fontWeight: "bold", color: "#3d2b1f", fontSize: 16 }}>{userName}</div><div style={{ fontSize: 11, color: "#b09070" }}>Logged in on this device</div></div>
            </div>
            <div style={{ fontSize: 12, color: "#7a5c3a", marginBottom: 8, fontWeight: "bold" }}>Change your name</div>
            <div style={{ display: "flex", gap: 8 }}>
              <input value={editNameInput} onChange={(e) => setEditNameInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && handleChangeName()} placeholder={userName} style={{ flex: 1, padding: "9px 13px", borderRadius: 10, border: "1.5px solid #e8ddd0", fontFamily: "Georgia, serif", fontSize: 14, background: "#fdf6ec", outline: "none" }} />
              <button onClick={handleChangeName} disabled={!editNameInput.trim()} style={{ background: editNameInput.trim() ? "#e8845c" : "#e8ddd0", color: editNameInput.trim() ? "#fff" : "#b09070", border: "none", borderRadius: 10, padding: "9px 16px", cursor: editNameInput.trim() ? "pointer" : "default", fontFamily: "Georgia, serif", fontSize: 14, fontWeight: "bold" }}>Save</button>
            </div>
          </div>

          <div style={{ background: "#fff", borderRadius: 16, padding: "18px", marginBottom: 16, border: "1.5px solid #e8ddd0" }}>
            <div style={{ fontSize: 11, fontWeight: "bold", letterSpacing: "1.5px", color: "#7a5c3a", textTransform: "uppercase", marginBottom: 14 }}>Everyone on this tracker</div>
            {allUsers.map(([uid, u]) => (
              <div key={uid} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: "1px solid #f0e8d8" }}>
                <div style={{ width: 36, height: 36, borderRadius: "50%", background: u.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>{u.avatar}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: uid === userId ? "bold" : "normal", color: "#3d2b1f", fontSize: 14 }}>{u.name} {uid === userId && <span style={{ fontSize: 11, color: userColor }}>(you)</span>}</div>
                  <div style={{ fontSize: 10, color: "#b09070" }}>Last active {u.lastSeen ? new Date(u.lastSeen).toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "unknown"}</div>
                </div>
              </div>
            ))}
          </div>

          <div style={{ background: "#fff", borderRadius: 16, padding: "18px", border: "1.5px solid #e8ddd0" }}>
            <div style={{ fontSize: 11, fontWeight: "bold", letterSpacing: "1.5px", color: "#7a5c3a", textTransform: "uppercase", marginBottom: 14 }}>Puppy Name</div>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}><span style={{ fontSize: 28 }}>🐾</span><div style={{ fontWeight: "bold", color: "#3d2b1f", fontSize: 18 }}>{dogName}</div></div>
            {editDogName ? (
              <div style={{ display: "flex", gap: 8 }}>
                <input value={dogNameInput} onChange={(e) => setDogNameInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") saveDogName(); if (e.key === "Escape") setEditDogName(false); }} placeholder="Puppy's name" style={{ flex: 1, padding: "9px 13px", borderRadius: 10, border: "1.5px solid #e8845c", fontFamily: "Georgia, serif", fontSize: 14, background: "#fdf6ec", outline: "none" }} />
                <button onClick={saveDogName} style={{ background: "#e8845c", color: "#fff", border: "none", borderRadius: 10, padding: "9px 16px", cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 14, fontWeight: "bold" }}>Save</button>
                <button onClick={() => setEditDogName(false)} style={{ background: "#e8ddd0", color: "#7a5c3a", border: "none", borderRadius: 10, padding: "9px 12px", cursor: "pointer", fontSize: 14 }}>x</button>
              </div>
            ) : (
              <button onClick={() => setEditDogName(true)} style={{ background: theme.tabBg, border: `1.5px solid ${theme.border}`, borderRadius: 10, padding: "9px 16px", cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 13, color: theme.textMid }}>edit Change puppy name</button>
            )}
          </div>

          {/* THEME PICKER */}
          <div style={{ background: theme.cardBg, borderRadius: 16, padding: "18px", marginTop: 16, border: `1.5px solid ${theme.border}` }}>
            <div style={{ fontSize: 11, fontWeight: "bold", letterSpacing: "1.5px", color: theme.textMid, textTransform: "uppercase", marginBottom: 14 }}>Color Theme</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {Object.entries(THEMES).map(([key, t]) => {
                const active = themeKey === key;
                return (
                  <button key={key} onClick={() => changeTheme(key)} style={{
                    display: "flex", alignItems: "center", gap: 10,
                    padding: "10px 12px", borderRadius: 12, cursor: "pointer",
                    border: `2px solid ${active ? theme.accent : theme.border}`,
                    background: active ? theme.accent + "15" : theme.cardBg,
                    fontFamily: "Georgia, serif",
                  }}>
                    <div style={{ width: 28, height: 28, borderRadius: 8, background: t.header, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>
                      {t.emoji}
                    </div>
                    <div style={{ textAlign: "left" }}>
                      <div style={{ fontSize: 13, fontWeight: active ? "bold" : "normal", color: theme.textDark }}>{t.name}</div>
                      {active && <div style={{ fontSize: 10, color: theme.accent }}>Active</div>}
                    </div>
                  </button>
                );
              })}
            </div>
          </div>

          {/* Profile photo in account */}
          <div style={{ background: theme.cardBg, borderRadius: 16, padding: "18px", marginTop: 16, border: `1.5px solid ${theme.border}` }}>
            <div style={{ fontSize: 11, fontWeight: "bold", letterSpacing: "1.5px", color: theme.textMid, textTransform: "uppercase", marginBottom: 14 }}>Header Photo</div>
            <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 14 }}>
              {profilePhoto ? (
                <div style={{ width: 64, height: 64, borderRadius: "50%", overflow: "hidden", border: `3px solid ${theme.accent}`, flexShrink: 0 }}>
                  <img src={profilePhoto} alt="Profile" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                </div>
              ) : (
                <div style={{ width: 64, height: 64, borderRadius: "50%", background: theme.tabBg, border: `2px dashed ${theme.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, flexShrink: 0 }}>🐾</div>
              )}
              <div>
                <div style={{ fontSize: 13, color: theme.textDark, marginBottom: 6 }}>{profilePhoto ? "Showing in header" : "No photo set"}</div>
                <label style={{ background: theme.accent, color: "#fff", borderRadius: 10, padding: "7px 14px", cursor: "pointer", fontSize: 12, fontFamily: "Georgia, serif", fontWeight: "bold", display: "inline-block" }}>
                  {profilePhoto ? "Change photo" : "Upload photo"}
                  <input type="file" accept="image/*" style={{ display: "none" }} onChange={e => e.target.files[0] && handleSetProfilePhoto(e.target.files[0])} />
                </label>
                {profilePhoto && <button onClick={() => { setProfilePhoto(null); const next = { ...getBase(), profilePhoto: null }; setShared(next); persist(next); }} style={{ marginLeft: 8, background: "none", border: "none", color: theme.textLight, cursor: "pointer", fontSize: 12 }}>Remove</button>}
              </div>
            </div>
          </div>

          <div style={{ height: 32 }} />
        </div>
      )}

      {/* NOODS CLUES */}
      {view === "clues" && (
        <NoodsClues
          shared={shared}
          userId={userId}
          userName={userName}
          theme={theme}
          PHASES={PHASES}
        />
      )}

      {/* GALLERY */}
      {view === "gallery" && (
        <GalleryView
          shared={shared}
          userId={userId}
          userName={userName}
          theme={theme}
          onAddPhoto={handleAddGalleryPhoto}
          onDeletePhoto={handleDeleteGalleryPhoto}
          onUpdateCaption={handleUpdateCaption}
        />
      )}
    </div>
  );
}


    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(e) { return { error: e }; }
      componentDidCatch(e, info) {
        var el = document.getElementById("err");
        el.style.display = "block";
        el.textContent = "Component error: " + e.message + "\n" + (e.stack||"") + "\n" + (info&&info.componentStack||"");
      }
      render() {
        if (this.state.error) return null;
        return this.props.children;
      }
    }

    try {
      createRoot(document.getElementById("root")).render(
        React.createElement(ErrorBoundary, null, React.createElement(App))
      );
    } catch(e) {
      var el = document.getElementById("err");
      el.style.display = "block";
      el.textContent = "Render error: " + e.message + "\n" + (e.stack||"");
    }
  </script>
</body>
</html>
