    function to12h(val24) {
      if (!val24) return { h: "12", m: "00", ampm: "AM" };
      const [hh, mm] = val24.split(":");
      let h = parseInt(hh, 10);
      const ampm = h >= 12 ? "PM" : "AM";
      if (h === 0) h = 12;
      else if (h > 12) h -= 12;
      return { h: String(h), m: mm || "00", ampm };
    }
    function to24h(h, m, ampm) {
      let hh = parseInt(h, 10);
      if (ampm === "AM" && hh === 12) hh = 0;
      else if (ampm === "PM" && hh !== 12) hh += 12;
      return String(hh).padStart(2,"0") + ":" + String(m).padStart(2,"0");
    }
    function fmt12h(val24) {
      if (!val24) return "";
      const { h, m, ampm } = to12h(val24);
      return h + ":" + m + " " + ampm;

const NOODLE_BIRTHDAY = new Date("2026-03-23");

function getNoodleAge(today) {
  const msPerDay = 1000 * 60 * 60 * 24;
  const days = Math.floor((today - NOODLE_BIRTHDAY) / msPerDay);
  const weeks = Math.floor(days / 7);
  if (days < 0) return { days: 0, weeks: 0, months: 0, label: "Not born yet!" };
  const months = Math.floor(days / 30.44);
  let label;
  if (weeks < 4) label = `${weeks} week${weeks !== 1 ? "s" : ""} old`;
  else if (months < 24) label = `${months} month${months !== 1 ? "s" : ""} old`;
  else label = `${Math.floor(months/12)} year${Math.floor(months/12) !== 1 ? "s" : ""} old`;
  return { days, weeks, months, label };
}

function getPhaseForAge(months) {
  if (months < 3) return "phase1";
  if (months < 6) return "phase2";
  return "phase3";
}

function getPhaseProgress(birthday, today) {
  const phases = [
    { id: "phase1", start: 0, end: 3 },
    { id: "phase2", start: 3, end: 6 },
    { id: "phase3", start: 6, end: 12 },
  ];
  const msPerDay = 1000 * 60 * 60 * 24;
  const days = Math.floor((today - birthday) / msPerDay);
  const months = days / 30.44;
  const phase = phases.find(p => months >= p.start && months < p.end) || phases[2];
  const phaseStartDays = phase.start * 30.44;
  const phaseDurationDays = (phase.end - phase.start) * 30.44;
  const daysIntoPhase = Math.max(0, days - phaseStartDays);
  const pct = Math.min(100, Math.round((daysIntoPhase / phaseDurationDays) * 100));
  const daysLeft = Math.max(0, Math.round(phaseDurationDays - daysIntoPhase));
  return { phase, pct, daysLeft, daysIntoPhase: Math.round(daysIntoPhase) };
}

// -- PURE HELPERS -------------------------------------------------------------
function mealKey(tid, mealIndex, ds, uid) { return `${tid}_meal${mealIndex}_${ds}_${uid}`; }
function whoCheckedMeal(comp, users, tid, mealIndex, ds) {
  return Object.entries(users || {})
    .filter(([uid]) => {
      const val = comp?.[mealKey(tid, mealIndex, ds, uid)];
      return val && (val === true || typeof val === "object");
    })
    .map(([uid, u]) => {
      const val = comp?.[mealKey(tid, mealIndex, ds, uid)];
      return { uid, name: u.name || "", color: u.color || "#999", avatar: u.avatar || "🐾", time: (typeof val === "object" ? val.time : "") || "" };
    });
}
function isFeedingDone(comp, users, tid, phaseId, ds) {
  const meals = FEEDING_MEALS[phaseId] || [];
  return meals.length > 0 && meals.every((meal, mealIdx) => whoCheckedMeal(comp, users, tid, mealIdx, ds).length > 0);
}
function whoChecked(comp, users, tid, ds) {
  return Object.entries(users || {})
    .filter(([uid]) => comp?.[`${tid}_${ds}_${uid}`])
    .map(([uid, u]) => ({ uid, name: u.name || "", color: u.color || "#999", avatar: u.avatar || "🐾" }));
}
function isChecked(comp, tid, ds, uid) { return !!comp?.[`${tid}_${ds}_${uid}`]; }

// -- POTTY HELPERS -------------------------------------------------------------
const POTTY_SLOTS = 12;
function pottyKey(tid, slotIdx, ds, uid) { return `${tid}_potty${slotIdx}_${ds}_${uid}`; }
function getPottySlotData(comp, users, tid, slotIdx, ds) {
  for (const [uid, u] of Object.entries(users || {})) {
    const key = pottyKey(tid, slotIdx, ds, uid);
    const val = comp?.[key];
    if (val) {
      // Handle legacy format (plain object saved before fix) or new format
      let time = "";
      let types = [];
      if (typeof val === "object" && val !== null) {
        const rawTime = val.time;
        time = (rawTime && typeof rawTime === "string") ? rawTime : "";
        const rawTypes = val.types;
        if (Array.isArray(rawTypes)) types = rawTypes.map(String);
        else if (rawTypes && typeof rawTypes === "object") types = Object.values(rawTypes).map(String);
      } else if (typeof val === "string") {
        time = val;
      }
      return {
        uid: String(uid),
        name: String(u.name || ""),
        color: String(u.color || "#999"),
        avatar: String(u.avatar || "🐾"),
        time,
        types,
      };
    }
  }
  return null;
}
function countPottyDone(comp, users, tid, ds) {
  let count = 0;
  for (let slotIdx = 0; slotIdx < POTTY_SLOTS; slotIdx++) {
    if (getPottySlotData(comp, users, tid, slotIdx, ds)) count++;
  }
  return count;
}

  const mins  = ["00","05","10","15","20","25","30","35","40","45","50","55"];

                    {anyDone && checkers[0].time && <span style={{ marginLeft: 6, fontWeight: "bold", color: "#3d2b1f", fontSize: 11 }}> {fmt12h(checkers[0].time)}</span>}
                  </span>
                  {checkers.map(u => <span key={u.uid} style={{ background: u.color, color: "#fff", borderRadius: 8, padding: "1px 6px", fontSize: 9, fontWeight: "bold" }}>{u.avatar} {u.uid === userId ? "You" : u.name}</span>)}
                </div>
                {isEditing && (
                  <div style={{ display: "flex", gap: 6, marginTop: 4, alignItems: "center" }}>
                    <span style={{ fontSize: 11, color: "#7a5c3a" }}>Time:</span>
                    <TimePicker value={timeInput} onChange={setTimeInput} color={phase.color} />
                    <button onClick={() => { onSaveMeal(task.id, mealIdx, dateStr, timeInput || ""); setEditingMeal(null); }} style={{ background: phase.color, color: "#fff", border: "none", borderRadius: 7, padding: "5px 12px", cursor: "pointer", fontSize: 12, fontWeight: "bold" }}>Log</button>
                    <button onClick={() => setEditingMeal(null)} style={{ background: "#e8ddd0", color: "#7a5c3a", border: "none", borderRadius: 7, padding: "5px 8px", cursor: "pointer", fontSize: 12 }}>x</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// -- BREAK DETAIL CARD --------------------------------------------------------
function BreakDetailCard({ entry, slotIdx, phase, userId, onSavePotty, onRemove, onClose }) {
  const [editing, setEditing] = useState(false);
  const [editTime, setEditTime] = useState(entry.time || "");
  const [editTypes, setEditTypes] = useState(
    Array.isArray(entry.types) ? entry.types : Object.values(entry.types || {}).map(String)
  );
  const [confirmDelete, setConfirmDelete] = useState(false);

  const toggleEditType = (type) => setEditTypes(prev => prev.includes(type) ? prev.filter(t => t !== type) : [...prev, type]);

  const lbl = (() => {
    const arr = Array.isArray(entry.types) ? entry.types : Object.values(entry.types || {}).map(String);
    if (arr.includes("Pee") && arr.includes("Poop")) return "Both";
    if (arr.includes("Pee")) return "Pee";
    if (arr.includes("Poop")) return "Poop";
    return "";
  })();
  const typeIcon = lbl === "Both" ? "💧💩" : lbl === "Pee" ? "💧" : lbl === "Poop" ? "💩" : "";

  const saveEdit = () => {
    onSavePotty({ time: editTime, types: editTypes });
    setEditing(false);
    onClose();
  };

  return (
    <div style={{ marginTop: 6, background: "#fff", border: "2px solid "+phase.color, borderRadius: 12, padding: "13px 14px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <span style={{ fontWeight: "bold", color: "#3d2b1f", fontSize: 13 }}>Break #{slotIdx + 1}</span>
        <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 18, cursor: "pointer", color: "#b09070", lineHeight: 1 }}>x</button>
      </div>

      {!editing ? (<>
        <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 10, padding: "8px 10px", background: phase.color+"12", borderRadius: 9 }}>
          <span style={{ fontSize: 26 }}>{typeIcon || "🐾"}</span>
          <div>
            <div style={{ fontSize: 14, fontWeight: "bold", color: "#3d2b1f" }}>{lbl || "No type logged"}</div>
            {entry.time && <div style={{ fontSize: 12, color: "#7a5c3a", marginTop: 1 }}>at {fmt12h(entry.time)}</div>}
          </div>
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 10px", background: "#f8f8f8", borderRadius: 9, marginBottom: 10 }}>
          <div style={{ width: 28, height: 28, borderRadius: "50%", background: entry.color || "#999", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15 }}>{entry.avatar}</div>
          <div>
            <div style={{ fontSize: 12, fontWeight: "bold", color: entry.color || "#999" }}>{entry.uid === userId ? "You" : entry.name}</div>
            <div style={{ fontSize: 10, color: "#b09070" }}>logged this break</div>
          </div>
        </div>

        <button onClick={() => setEditing(true)} style={{ width: "100%", background: phase.color+"15", border: "1.5px solid "+phase.color+"50", borderRadius: 9, padding: "8px", cursor: "pointer", color: "#3d2b1f", fontSize: 12, fontFamily: "Georgia, serif", fontWeight: "bold", marginBottom: 8 }}>
          Edit entry
        </button>

        {!confirmDelete ? (
          <button onClick={() => setConfirmDelete(true)} style={{ width: "100%", background: "#fff", border: "1.5px solid #e8ddd0", borderRadius: 9, padding: "8px", cursor: "pointer", color: "#b09070", fontSize: 12, fontFamily: "Georgia, serif" }}>
            Remove entry
          </button>
        ) : (
          <div style={{ background: "#fff0f0", border: "1.5px solid #e87c7c", borderRadius: 9, padding: "10px" }}>
            <div style={{ fontSize: 12, color: "#3d2b1f", textAlign: "center", marginBottom: 8, fontWeight: "bold" }}>Remove this break?</div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => { onRemove(); onClose(); }} style={{ flex: 1, background: "#e87c7c", color: "#fff", border: "none", borderRadius: 8, padding: "8px", cursor: "pointer", fontSize: 12, fontFamily: "Georgia, serif", fontWeight: "bold" }}>Yes, remove</button>
              <button onClick={() => setConfirmDelete(false)} style={{ flex: 1, background: "#e8ddd0", color: "#3d2b1f", border: "none", borderRadius: 8, padding: "8px", cursor: "pointer", fontSize: 12, fontFamily: "Georgia, serif" }}>Cancel</button>
            </div>
          </div>
        )}
      </>) : (<>
        <div style={{ marginBottom: 10 }}>
          <div style={{ fontSize: 11, color: "#7a5c3a", fontWeight: "bold", marginBottom: 6 }}>Time:</div>
          <TimePicker value={editTime} onChange={setEditTime} color={phase.color} />
        </div>
        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 11, color: "#7a5c3a", fontWeight: "bold", marginBottom: 6 }}>Type:</div>
          <div style={{ display: "flex", gap: 6 }}>
            {["Pee", "Poop", "Both"].map(type => {
              const isBoth = type === "Both";
              const selected = isBoth ? editTypes.length === 2 : editTypes.includes(type);
              return (
                <button key={type} onClick={() => { if (isBoth) setEditTypes(["Pee","Poop"]); else toggleEditType(type); }} style={{
                  flex: 1, padding: "8px 4px", borderRadius: 8, cursor: "pointer",
                  fontFamily: "Georgia, serif", fontSize: 12,
                  border: "2px solid "+(selected ? phase.color : "#e8ddd0"),
                  background: selected ? phase.color+"25" : "#fff",
                  color: selected ? "#3d2b1f" : "#9a7a5a",
                  fontWeight: selected ? "bold" : "normal",
                }}>
                  {type === "Pee" ? "💧 Pee" : type === "Poop" ? "💩 Poop" : "Both"}
                </button>
              );
            })}
          </div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={saveEdit} style={{ flex: 1, background: phase.color, color: "#fff", border: "none", borderRadius: 9, padding: "9px", cursor: "pointer", fontSize: 13, fontFamily: "Georgia, serif", fontWeight: "bold" }}>Save changes</button>
          <button onClick={() => setEditing(false)} style={{ background: "#e8ddd0", color: "#3d2b1f", border: "none", borderRadius: 9, padding: "9px 14px", cursor: "pointer", fontSize: 13, fontFamily: "Georgia, serif" }}>Cancel</button>
        </div>
      </>)}
    </div>
  );
}

// -- POTTY TASK ROW ------------------------------------------------------------
function PottyTaskRow({ task, phase, dateStr, shared, userId, userColor, onSavePotty, onSaveNote }) {
  const [open, setOpen] = useState(false);
  const [editNote, setEditNote] = useState(false);
  const [noteText, setNoteText] = useState("");
  const [editingSlot, setEditingSlot] = useState(null);
  const [timeInput, setTimeInput] = useState("");
  const [typesInput, setTypesInput] = useState([]);
  const comp  = shared?.completions || {};
  const users = shared?.users || {};
  const doneCount = countPottyDone(comp, users, task.id, dateStr);
  const note = shared?.notes?.[task.id];

  const [viewingSlot, setViewingSlot] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [confirmSlot, setConfirmSlot] = useState(null);

  const startLog = (slotIdx) => {
    if (getPottySlotData(comp, users, task.id, slotIdx, dateStr)) {
      onSavePotty(task.id, slotIdx, dateStr, null);
    } else {
      const now = new Date();
      setTimeInput(String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0"));
      setTypesInput([]);
      setEditingSlot(slotIdx);
    }
  };

  const toggleType = (type) => setTypesInput(prev => prev.includes(type) ? prev.filter(t => t !== type) : [...prev, type]);

  const typeLabel = (types) => {
    if (!types) return "";
    const arr = Array.isArray(types) ? types : Object.values(types).map(String);
    if (arr.length === 0) return "";
    const hasPee = arr.includes("Pee");
    const hasPoop = arr.includes("Poop");
    if (hasPee && hasPoop) return "Both";
    if (hasPee) return "Pee";
    if (hasPoop) return "Poop";
    return "";
  };

  return (
    <div style={{ background: doneCount > 0 ? phase.color+"15" : "#fff", border: "1.5px solid "+(doneCount > 0 ? phase.color : "#e8ddd0"), borderRadius: 10, marginBottom: 5, overflow: "hidden" }}>
      <div style={{ display: "flex", alignItems: "flex-start", gap: 9, padding: "10px 11px" }}>
        <button onClick={() => setOpen(o => !o)} style={{ width: 22, height: 22, borderRadius: 5, flexShrink: 0, marginTop: 1, border: "2px solid "+(doneCount > 0 ? phase.color : "#c4b09a"), background: doneCount > 0 ? phase.color : "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: doneCount > 0 ? "#fff" : "#7a5c3a" }}>
          {open ? "^" : "v"}
        </button>
        <div style={{ flex: 1 }}>
          <div style={{ color: doneCount > 0 ? "#7a5c3a" : "#3d2b1f", fontSize: 13, display: "flex", alignItems: "center", gap: 6, cursor: "pointer", flexWrap: "wrap" }} onClick={() => setOpen(o => !o)}>
            <span>{task.text}</span>
            <span style={{ fontSize: 10, background: doneCount > 0 ? phase.color : "#e8ddd0", color: doneCount > 0 ? "#fff" : "#7a5c3a", borderRadius: 8, padding: "1px 7px", fontWeight: "bold" }}>{doneCount}/{POTTY_SLOTS}</span>
          </div>
          <div style={{ fontSize: 10, color: "#b09070", marginTop: 1 }}>Daily -- <span style={{ color: "#c4a96b" }}>tap to log time + pee/poop</span></div>

          {/* Summary pills for logged breaks - collapsed view */}
          {doneCount > 0 && !open && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 6 }}>
              {Array.from({ length: POTTY_SLOTS }, (_, slotIdx) => {
                const entry = getPottySlotData(comp, users, task.id, slotIdx, dateStr);
                if (!entry) return null;
                const lbl = typeLabel(entry.types);
                const typeIcon = lbl === "Both" ? "💧💩" : lbl === "Pee" ? "💧" : lbl === "Poop" ? "💩" : "✓";
                return (
                  <button key={slotIdx} onClick={() => { setViewingSlot(slotIdx); setConfirmDelete(false); }} style={{
                    display: "flex", alignItems: "center", gap: 3,
                    background: phase.color+"25", border: "1.5px solid "+phase.color+"60",
                    borderRadius: 10, padding: "3px 8px",
                    cursor: "pointer", fontFamily: "Georgia, serif",
                  }}>
                    <span style={{ fontSize: 13 }}>{typeIcon}</span>
                    {entry.time && <span style={{ fontWeight: "bold", color: "#3d2b1f", fontSize: 11 }}>{fmt12h(entry.time)}</span>}
                  </button>
                );
              })}
              <button onClick={() => setOpen(true)} style={{
                background: "transparent", border: "1.5px dashed "+phase.color+"60",
                borderRadius: 10, padding: "3px 8px", fontSize: 10,
                cursor: "pointer", color: phase.color, fontFamily: "Georgia, serif",
              }}>+ log</button>
            </div>
          )}

          {/* Detail card for a tapped break */}
          {viewingSlot !== null && (() => {
            const entry = getPottySlotData(comp, users, task.id, viewingSlot, dateStr);
            if (!entry) { setViewingSlot(null); return null; }
            return (
              <BreakDetailCard
                key={viewingSlot}
                entry={entry}
                slotIdx={viewingSlot}
                phase={phase}
                userId={userId}
                onSavePotty={(data) => onSavePotty(task.id, viewingSlot, dateStr, data)}
                onRemove={() => { onSavePotty(task.id, viewingSlot, dateStr, null); }}
                onClose={() => setViewingSlot(null)}
              />
            );
          })()}

          {note && !editNote && <div style={{ marginTop: 5, fontSize: 11, color: "#7a5c3a", background: "#fdf0e0", borderRadius: 5, padding: "3px 7px", fontStyle: "italic" }}>{String(note.text||"")} -- {String(note.byName||"")}</div>}
          {editNote && (
            <div style={{ marginTop: 6, display: "flex", gap: 5 }}>
              <input value={noteText} onChange={e => setNoteText(e.target.value)} placeholder="Add a note..." style={{ flex: 1, padding: "4px 7px", borderRadius: 5, border: "1px solid #c4b09a", fontFamily: "Georgia, serif", fontSize: 11, background: "#fff8f0" }} />
              <button onClick={() => { onSaveNote(task.id, noteText); setEditNote(false); }} style={{ background: phase.color, color: "#fff", border: "none", borderRadius: 5, padding: "4px 9px", cursor: "pointer", fontSize: 11 }}>Save</button>
              <button onClick={() => setEditNote(false)} style={{ background: "#e8ddd0", color: "#7a5c3a", border: "none", borderRadius: 5, padding: "4px 7px", cursor: "pointer", fontSize: 11 }}>x</button>
            </div>
          )}
        </div>
        <button onClick={() => { setEditNote(true); setNoteText(note?.text || ""); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 11, opacity: 0.4, padding: 2 }}>note</button>
      </div>
      {open && (
        <div style={{ borderTop: "1px solid "+phase.color+"30", background: phase.color+"08", padding: "8px 11px 10px" }}>
          {Array.from({ length: POTTY_SLOTS }, (_, slotIdx) => {
            const entry = getPottySlotData(comp, users, task.id, slotIdx, dateStr);
            const isEditing = editingSlot === slotIdx;
            const lbl = entry ? typeLabel(entry.types) : "";
            const typeIcon = lbl === "Both" ? "💧💩" : lbl === "Pee" ? "💧" : lbl === "Poop" ? "💩" : "";
            const isConfirming = confirmSlot === slotIdx;
            return (
              <div key={slotIdx} style={{ marginBottom: slotIdx < POTTY_SLOTS - 1 ? 5 : 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 9px", background: entry ? phase.color+"20" : "rgba(255,255,255,0.7)", borderRadius: 8, border: "1px solid "+(isConfirming ? "#e87c7c" : entry ? phase.color : "#e8ddd0") }}>
                  <button onClick={() => {
                    if (entry) { setConfirmSlot(slotIdx); }
                    else { startLog(slotIdx); }
                  }} style={{ width: 20, height: 20, borderRadius: 4, flexShrink: 0, border: "2px solid "+(entry ? (entry.color || userColor) : "#c4b09a"), background: entry ? (entry.color || userColor) : "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: "#fff" }}>{entry ? "v" : ""}</button>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 12, color: entry ? "#3d2b1f" : "#9a7a5a", display: "flex", alignItems: "center", gap: 5, flexWrap: "wrap" }}>
                      <span style={{ fontWeight: entry ? "bold" : "normal" }}>Break #{slotIdx + 1}</span>
                      {entry && entry.time && typeof entry.time === "string" && (
                        <span style={{ fontSize: 12, color: "#3d2b1f" }}>{fmt12h(entry.time)}</span>
                      )}
                      {entry && typeIcon && (
                        <span style={{ fontSize: 13 }}>{typeIcon}</span>
                      )}
                      {entry && lbl && (
                        <span style={{ fontSize: 10, background: phase.color, color: "#fff", borderRadius: 6, padding: "1px 6px", fontWeight: "bold" }}>{lbl}</span>
                      )}
                    </div>
                    {entry && !isConfirming && (
                      <div style={{ fontSize: 10, color: entry.color || "#999", marginTop: 2, display: "flex", alignItems: "center", gap: 3 }}>
                        <span>{entry.avatar}</span>
                        <span style={{ fontWeight: "bold" }}>{entry.uid === userId ? "You" : entry.name}</span>
                        {entry.time && <span style={{ color: "#b09070" }}>at {fmt12h(entry.time)}</span>}
                      </div>
                    )}
                    {isConfirming && (
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 4 }}>
                        <span style={{ fontSize: 11, color: "#e87c7c", fontWeight: "bold" }}>Remove this break?</span>
                        <button onClick={() => { startLog(slotIdx); setConfirmSlot(null); }} style={{ background: "#e87c7c", color: "#fff", border: "none", borderRadius: 6, padding: "3px 9px", cursor: "pointer", fontSize: 11, fontFamily: "Georgia, serif", fontWeight: "bold" }}>Yes</button>
                        <button onClick={() => setConfirmSlot(null)} style={{ background: "#e8ddd0", color: "#7a5c3a", border: "none", borderRadius: 6, padding: "3px 9px", cursor: "pointer", fontSize: 11, fontFamily: "Georgia, serif" }}>No</button>
                      </div>
                    )}
                  </div>
                  {entry && !isConfirming && <button onClick={() => setConfirmSlot(slotIdx)} style={{ background: "none", border: "none", fontSize: 11, color: "#b09070", cursor: "pointer", padding: "0 2px", flexShrink: 0 }}>✕</button>}
                </div>
                {isEditing && (
                  <div style={{ background: "#fff", borderRadius: 8, padding: "10px", marginTop: 4, border: "1.5px solid "+phase.color+"40" }}>
                    <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 10 }}>
                      <span style={{ fontSize: 11, color: "#7a5c3a", fontWeight: "bold" }}>Time:</span>
                      <TimePicker value={timeInput} onChange={setTimeInput} color={phase.color} />
                    </div>
                    <div style={{ marginBottom: 10 }}>
                      <span style={{ fontSize: 11, color: "#7a5c3a", fontWeight: "bold", display: "block", marginBottom: 6 }}>Type:</span>
                      <div style={{ display: "flex", gap: 6 }}>
                        {["Pee", "Poop", "Both"].map(type => {
                          const isBoth = type === "Both";
                          const selected = isBoth ? typesInput.length === 2 : typesInput.includes(type);
                          return (
                            <button key={type} onClick={() => {
                              if (isBoth) { setTypesInput(["Pee","Poop"]); }
                              else { toggleType(type); }
                            }} style={{
                              flex: 1, padding: "8px 4px", borderRadius: 8, cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12,
                              border: "2px solid "+(selected ? phase.color : "#e8ddd0"),
                              background: selected ? phase.color+"25" : "#fff",
                              color: selected ? "#3d2b1f" : "#9a7a5a",
                              fontWeight: selected ? "bold" : "normal"
                            }}>
                              {type === "Pee" ? "💧 Pee" : type === "Poop" ? "💩 Poop" : "Both"}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={() => { onSavePotty(task.id, slotIdx, dateStr, { time: timeInput || "", types: typesInput }); setEditingSlot(null); setTypesInput([]); }} style={{ flex: 1, background: phase.color, color: "#fff", border: "none", borderRadius: 7, padding: "8px", cursor: "pointer", fontSize: 13, fontWeight: "bold" }}>Log Break</button>
                      <button onClick={() => { setEditingSlot(null); setTypesInput([]); }} style={{ background: "#e8ddd0", color: "#7a5c3a", border: "none", borderRadius: 7, padding: "8px 12px", cursor: "pointer", fontSize: 13 }}>Cancel</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// -- REGULAR ROW ---------------------------------------------------------------
function RegularTaskRow({ task, phase, dateStr, shared, userId, userColor, allUsers, onToggleTask, onSaveNote }) {
  const [editNote, setEditNote] = useState(false);
  const [noteText, setNoteText] = useState("");
  const comp     = shared?.completions || {};
  const users    = shared?.users || {};
  const myCheck  = isChecked(comp, task.id, dateStr, userId);
  const checkers = whoChecked(comp, users, task.id, dateStr);
  const anyDone  = checkers.length > 0;
  const note     = shared?.notes?.[task.id];

  return (
    <div style={{ background: anyDone ? `${phase.color}15` : "#fff", border: `1.5px solid ${anyDone ? phase.color : "#e8ddd0"}`, borderRadius: 10, padding: "10px 11px", marginBottom: 5 }}>
      <div style={{ display: "flex", alignItems: "flex-start", gap: 9 }}>
        <button onClick={() => onToggleTask(task.id, dateStr)} style={{ width: 22, height: 22, borderRadius: 5, flexShrink: 0, marginTop: 1, border: `2px solid ${myCheck ? userColor : "#c4b09a"}`, background: myCheck ? userColor : "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, color: "#fff" }}>{myCheck ? "v" : ""}</button>
        <div style={{ flex: 1 }}>
          <div style={{ color: anyDone ? "#7a5c3a" : "#3d2b1f", fontSize: 13, textDecoration: anyDone && checkers.length === allUsers.length ? "line-through" : "none" }}>{task.text}</div>
          <div style={{ fontSize: 10, color: "#b09070", marginTop: 1 }}>{task.frequency === "milestone" ? "* Milestone" : task.frequency === "weekly" ? "🔁 Weekly" : "📅 Daily"}</div>
          {checkers.length > 0 && <div style={{ display: "flex", gap: 4, marginTop: 5, flexWrap: "wrap" }}>{checkers.map((u) => <span key={u.uid} style={{ background: u.color, color: "#fff", borderRadius: 10, padding: "1px 7px", fontSize: 10, fontWeight: "bold" }}>{u.avatar} {u.uid === userId ? "You" : u.name}</span>)}</div>}
          {note && !editNote && <div style={{ marginTop: 5, fontSize: 11, color: "#7a5c3a", background: "#fdf0e0", borderRadius: 5, padding: "3px 7px", fontStyle: "italic" }}>📝 {note.text} <span style={{ color: "#b09070" }}>-- {note.byName}</span></div>}
          {editNote && (
            <div style={{ marginTop: 6, display: "flex", gap: 5 }}>
              <input value={noteText} onChange={(e) => setNoteText(e.target.value)} onKeyDown={(e) => e.key === "Enter" && (onSaveNote(task.id, noteText), setEditNote(false))} placeholder="Add a shared note..." style={{ flex: 1, padding: "4px 7px", borderRadius: 5, border: "1px solid #c4b09a", fontFamily: "Georgia, serif", fontSize: 11, background: "#fff8f0" }} />
              <button onClick={() => { onSaveNote(task.id, noteText); setEditNote(false); }} style={{ background: phase.color, color: "#fff", border: "none", borderRadius: 5, padding: "4px 9px", cursor: "pointer", fontSize: 11 }}>Save</button>
              <button onClick={() => setEditNote(false)} style={{ background: "#e8ddd0", color: "#7a5c3a", border: "none", borderRadius: 5, padding: "4px 7px", cursor: "pointer", fontSize: 11 }}>x</button>
            </div>
          )}
        </div>
        <button onClick={() => { setEditNote(true); setNoteText(note?.text || ""); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, opacity: 0.35, padding: 2, flexShrink: 0 }}>📝</button>
      </div>
    </div>
  );
}

// -- TASK LIST -----------------------------------------------------------------
function TaskList({ dateStr, phase, shared, userId, userColor, userName, allUsers, syncing, PHASES, onToggleTask, onSaveMeal, onSaveNote, onSavePotty }) {
  const comp  = shared?.completions || {};
  const users = shared?.users || {};
  const visible = phase.tasks.filter((t) => shouldShow(t, dateStr));
  const hidden  = phase.tasks.filter((t) => t.frequency === "weekly" && !isFriday(dateStr));
  const done    = visible.filter((t) => {
    if (t.category === "Feeding") return isFeedingDone(comp, users, t.id, phase.id, dateStr);
    if (t.category === "Potty") return countPottyDone(comp, users, t.id, dateStr) > 0;
    return allUsers.some(([uid]) => isChecked(comp, t.id, dateStr, uid));
  }).length;
  const rp = { shared, userId, userColor, userName, allUsers, PHASES, onToggleTask, onSaveMeal, onSaveNote, onSavePotty };

  return (
    <div style={{ padding: "14px 13px 0", maxWidth: 600, margin: "0 auto" }}>
      <div style={{ background: phase.color, borderRadius: 14, padding: "11px 15px", marginBottom: 13, display: "flex", alignItems: "center", gap: 10 }}>
        <span style={{ fontSize: 26 }}>{phase.emoji}</span>
        <div><div style={{ color: "#fff", fontWeight: "bold", fontSize: 15 }}>{phase.label}</div><div style={{ color: "rgba(255,255,255,0.85)", fontSize: 11 }}>{phase.weeks}</div></div>
        <div style={{ marginLeft: "auto", textAlign: "center", background: "rgba(255,255,255,0.22)", borderRadius: 10, padding: "4px 11px" }}>
          <div style={{ color: "#fff", fontWeight: "bold", fontSize: 18 }}>{done}/{visible.length}</div>
          <div style={{ color: "rgba(255,255,255,0.9)", fontSize: 9 }}>done</div>
        </div>
      </div>

      <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
        {allUsers.map(([uid, u]) => (
          <div key={uid} style={{ display: "flex", alignItems: "center", gap: 5, background: uid === userId ? u.color : "rgba(0,0,0,0.06)", borderRadius: 20, padding: "3px 10px 3px 6px", border: `1.5px solid ${u.color}` }}>
            <span style={{ fontSize: 14 }}>{u.avatar}</span>
            <span style={{ fontSize: 11, color: uid === userId ? "#fff" : "#5c3d2a", fontWeight: uid === userId ? "bold" : "normal" }}>{uid === userId ? "You" : u.name}</span>
          </div>
        ))}
        {syncing && <span style={{ fontSize: 10, color: "#b09070", alignSelf: "center" }}>~ syncing...</span>}
      </div>

      {hidden.length > 0 && (
        <div style={{ background: "#f8f4ec", border: "1.5px dashed #c4a96b", borderRadius: 10, padding: "8px 12px", marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 16 }}>📅</span>
          <div style={{ fontSize: 11, color: "#7a5c3a" }}><strong>{hidden.length} weekly task{hidden.length > 1 ? "s" : ""}</strong> appear on <strong>Fridays</strong> only.</div>
        </div>
      )}

      {Array.from(new Set(visible.map((t) => t.category))).map((cat) => (
        <div key={cat} style={{ marginBottom: 12 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5 }}>
            <div style={{ width: 7, height: 7, borderRadius: "50%", background: CAT_COLORS[cat] || "#999" }} />
            <span style={{ fontSize: 10, fontWeight: "bold", letterSpacing: "1.5px", color: "#7a5c3a", textTransform: "uppercase" }}>{cat}</span>
          </div>
          {visible.filter((t) => t.category === cat).map((task) =>
            task.category === "Feeding"
              ? <FeedingTaskRow key={task.id} task={task} phase={phase} dateStr={dateStr} {...rp} />
              : task.category === "Potty"
              ? <PottyTaskRow key={task.id} task={task} phase={phase} dateStr={dateStr} {...rp} />
              : <RegularTaskRow key={task.id} task={task} phase={phase} dateStr={dateStr} {...rp} />
          )}
        </div>
      ))}

      <div style={{ background: "#fff8f0", border: "1.5px solid #e8845c", borderRadius: 11, padding: "10px 12px", marginTop: 4, display: "flex", gap: 9, alignItems: "flex-start" }}>
        <span style={{ fontSize: 17 }}>!</span>
        <div style={{ color: "#7a5c3a", fontSize: 11, lineHeight: 1.5 }}><strong style={{ color: "#3d2b1f" }}>Spine Protection:</strong> Always use ramps. No jumping. Harness on walks.</div>
      </div>
      <div style={{ height: 28 }} />
    </div>
  );
}

// -- NOODS CLUES ANALYTICS ----------------------------------------------------
function NoodsClues({ shared, userId, userName, theme, PHASES }) {
  const [section, setSection] = useState("potty");
  const [weightInput, setWeightInput] = useState("");

  const comp  = shared?.completions || {};
  const users = shared?.users || {};
  const allUids = Object.keys(users);

  // Build last 30 days array
  const days30 = Array.from({ length: 30 }, (_, i) => {
    const d = new Date();
    d.setDate(d.getDate() - (29 - i));
    return d.toDateString();
  });
  const days14 = days30.slice(16);
  const days7  = days30.slice(23);

  // ── POTTY DATA ──────────────────────────────────────────────────────────────
  function getPottyBreaksForDay(ds) {
    const breaks = [];
    for (let slot = 0; slot < 12; slot++) {
      for (const uid of allUids) {
        const key = `p1_2_potty${slot}_${ds}_${uid}`;
        const val = comp[key];
        if (val && typeof val === "object") {
          const types = val.types ? Object.values(val.types).map(String) : [];
          breaks.push({ slot, uid, time: val.time || "", types, hasPee: types.includes("Pee"), hasPoop: types.includes("Poop") });
          break;
        }
      }
    }
    return breaks;
  }

  const pottyByDay = days30.map(ds => ({ ds, breaks: getPottyBreaksForDay(ds) }));
  const maxBreaks = Math.max(...pottyByDay.map(d => d.breaks.length), 1);

  // Time of day buckets
  const timeBuckets = { "12-6am": 0, "6-9am": 0, "9am-12pm": 0, "12-3pm": 0, "3-6pm": 0, "6-9pm": 0, "9pm-12am": 0 };
  pottyByDay.forEach(({ breaks }) => breaks.forEach(b => {
    if (!b.time) return;
    const h = parseInt(b.time.split(":")[0], 10);
    if (h < 6) timeBuckets["12-6am"]++;
    else if (h < 9) timeBuckets["6-9am"]++;
    else if (h < 12) timeBuckets["9am-12pm"]++;
    else if (h < 15) timeBuckets["12-3pm"]++;
    else if (h < 18) timeBuckets["3-6pm"]++;
    else if (h < 21) timeBuckets["6-9pm"]++;
    else timeBuckets["9pm-12am"]++;
  }));
  const maxBucket = Math.max(...Object.values(timeBuckets), 1);

  // Type breakdown
  let totalPee = 0, totalPoop = 0, totalBoth = 0;
  pottyByDay.forEach(({ breaks }) => breaks.forEach(b => {
    if (b.hasPee && b.hasPoop) totalBoth++;
    else if (b.hasPee) totalPee++;
    else if (b.hasPoop) totalPoop++;
  }));
  const totalTyped = totalPee + totalPoop + totalBoth;

  // Who logs more
  const pottyByUser = {};
  allUids.forEach(uid => { pottyByUser[uid] = 0; });
  pottyByDay.forEach(({ breaks }) => breaks.forEach(b => { if (pottyByUser[b.uid] !== undefined) pottyByUser[b.uid]++; }));

  // Streak: consecutive days with at least 1 potty break logged
  let pottyStreak = 0;
  for (let i = days30.length - 1; i >= 0; i--) {
    if (pottyByDay[i].breaks.length > 0) pottyStreak++;
    else break;
  }

  // ── FEEDING DATA ────────────────────────────────────────────────────────────
  function getMealsForDay(ds) {
    let count = 0;
    const mealKeys = ["p1_1", "p2_1", "p3_1"];
    for (const tid of mealKeys) {
      for (let m = 0; m < 3; m++) {
        for (const uid of allUids) {
          const key = `${tid}_meal${m}_${ds}_${uid}`;
          if (comp[key]) { count++; break; }
        }
      }
    }
    return count;
  }
  const feedByDay = days30.map(ds => ({ ds, meals: getMealsForDay(ds) }));
  const maxMeals = 3;

  // Who feeds more
  const feedByUser = {};
  allUids.forEach(uid => { feedByUser[uid] = 0; });
  days30.forEach(ds => {
    ["p1_1","p2_1","p3_1"].forEach(tid => {
      for (let m = 0; m < 3; m++) {
        allUids.forEach(uid => { if (comp[`${tid}_meal${m}_${ds}_${uid}`]) feedByUser[uid]++; });
      }
    });
  });

  // Meal time-of-day buckets
  const mealTimeBuckets = { "5-8am": 0, "8-10am": 0, "10am-12pm": 0, "12-2pm": 0, "2-4pm": 0, "4-6pm": 0, "6-8pm": 0, "8pm+": 0 };
  const mealTimeEntries = []; // { label, time, mealIdx } for per-meal breakdown
  days30.forEach(ds => {
    ["p1_1","p2_1","p3_1"].forEach(tid => {
      for (let mealIdx = 0; mealIdx < 3; mealIdx++) {
        allUids.forEach(uid => {
          const val = comp[`${tid}_meal${mealIdx}_${ds}_${uid}`];
          if (val && typeof val === "object" && val.time) {
            const h = parseInt(val.time.split(":")[0], 10);
            if (h < 8)       mealTimeBuckets["5-8am"]++;
            else if (h < 10) mealTimeBuckets["8-10am"]++;
            else if (h < 12) mealTimeBuckets["10am-12pm"]++;
            else if (h < 14) mealTimeBuckets["12-2pm"]++;
            else if (h < 16) mealTimeBuckets["2-4pm"]++;
            else if (h < 18) mealTimeBuckets["4-6pm"]++;
            else if (h < 20) mealTimeBuckets["6-8pm"]++;
            else             mealTimeBuckets["8pm+"]++;
            mealTimeEntries.push({ mealIdx, time: val.time, h });
          }
        });
      }
    });
  });
  const maxMealBucket = Math.max(...Object.values(mealTimeBuckets), 1);
  const totalMealTimed = Object.values(mealTimeBuckets).reduce((a,b) => a+b, 0);

  // Average time per meal slot
  const mealSlotTimes = [[], [], []]; // morning, midday, evening
  mealTimeEntries.forEach(e => { if (mealSlotTimes[e.mealIdx]) mealSlotTimes[e.mealIdx].push(e.h); });
  const avgMealTime = mealSlotTimes.map(times => {
    if (!times.length) return null;
    const avg = times.reduce((a,b) => a+b,0) / times.length;
    const h = Math.floor(avg);
    const ampm = h >= 12 ? "PM" : "AM";
    const h12 = h > 12 ? h - 12 : h === 0 ? 12 : h;
    return `~${h12}${ampm}`;
  });
  const mealSlotNames = ["Morning", "Midday/Afternoon", "Evening"];

  // ── TASK COMPLETION DATA ─────────────────────────────────────────────────────
  function getDayCompletion(ds) {
    const allTasks = PHASES.flatMap(p => p.tasks.filter(t => {
      if (t.frequency === "weekly") return new Date(ds).getDay() === 5;
      return true;
    }));
    if (!allTasks.length) return 0;
    const done = allTasks.filter(t => allUids.some(uid => comp[`${t.id}_${ds}_${uid}`])).length;
    return Math.round((done / allTasks.length) * 100);
  }
  const completionByDay = days30.map(ds => ({ ds, pct: getDayCompletion(ds) }));

  // Streak: consecutive days with 100% completion
  let completionStreak = 0;
  for (let i = completionByDay.length - 1; i >= 0; i--) {
    if (completionByDay[i].pct === 100) completionStreak++;
    else break;
  }

  // Most skipped tasks
  const taskSkips = {};
  PHASES.forEach(p => p.tasks.forEach(t => {
    const skipped = days30.filter(ds => {
      const show = t.frequency === "weekly" ? new Date(ds).getDay() === 5 : true;
      if (!show) return false;
      return !allUids.some(uid => comp[`${t.id}_${ds}_${uid}`]);
    }).length;
    taskSkips[t.id] = { text: t.text, skipped, phase: p.label };
  }));
  const topSkipped = Object.values(taskSkips).sort((a, b) => b.skipped - a.skipped).slice(0, 5);

  // You vs partner contribution
  const contribByUser = {};
  allUids.forEach(uid => { contribByUser[uid] = 0; });
  Object.keys(comp).forEach(key => {
    allUids.forEach(uid => { if (key.endsWith("_" + uid)) contribByUser[uid]++; });
  });
  const totalContrib = Math.max(Object.values(contribByUser).reduce((a, b) => a + b, 0), 1);

  // ── WEIGHT DATA ──────────────────────────────────────────────────────────────
  const weights = Array.isArray(shared?.weights) ? shared.weights : [];

  // ── MILESTONE DATA ───────────────────────────────────────────────────────────
  const milestones = Array.isArray(shared?.milestones) ? shared.milestones : [];

  // ── HELPERS ──────────────────────────────────────────────────────────────────
  const avg = (arr) => arr.length ? (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(1) : "0";
  const shortDate = (ds) => { const d = new Date(ds); return (d.getMonth()+1)+"/"+d.getDate(); };

  const barColor = theme.accent;
  const BAR_H = 48;

                  <div style={{ width: "100%", background: breaks.length > 0 ? barColor : theme.border, borderRadius: 3, height: Math.max(2, (breaks.length / maxBreaks) * BAR_H) }} />

            </div>
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
              <span style={{ fontSize: 9, color: theme.textLight }}>{shortDate(days30[0])}</span>

          {/* Time of day */}
          <div style={{ background: theme.cardBg, borderRadius: 14, padding: "14px", marginBottom: 14, border: `1.5px solid ${theme.border}` }}>
            <div style={{ fontSize: 12, fontWeight: "bold", color: theme.textDark, marginBottom: 10 }}>When does she usually go?</div>
            {Object.entries(timeBuckets).map(([label, count]) => (

                  <div style={{ height: "100%", width: `${(count / maxBucket) * 100}%`, background: barColor, borderRadius: 4 }} />

                <div style={{ fontSize: 10, color: theme.textLight, width: 20, textAlign: "right" }}>{count}</div>
              </div>
            ))}
          </div>

          {/* Pee vs Poop */}
          <div style={{ background: theme.cardBg, borderRadius: 14, padding: "14px", marginBottom: 14, border: `1.5px solid ${theme.border}` }}>
            <div style={{ fontSize: 12, fontWeight: "bold", color: theme.textDark, marginBottom: 10 }}>Type breakdown (30d)</div>
            {totalTyped === 0 ? <div style={{ fontSize: 11, color: theme.textLight }}>No type data logged yet.</div> : (
              <div style={{ display: "flex", gap: 8 }}>
                {[["💧 Pee", totalPee, "#6b9fc4"], ["💩 Poop", totalPoop, "#c4a96b"], ["Both", totalBoth, "#9c7cb8"]].map(([lbl, count, color]) => (

                    <div style={{ fontSize: 9, color: theme.textLight }}>{totalTyped ? Math.round((count/totalTyped)*100) : 0}%</div>
                    <div style={{ fontSize: 10, color: theme.textMid }}>{lbl.split(" ").slice(1).join(" ") || lbl}</div>
                  </div>

          </div>

          {/* Who logs potty */}
          <div style={{ background: theme.cardBg, borderRadius: 14, padding: "14px", border: `1.5px solid ${theme.border}` }}>
            <div style={{ fontSize: 12, fontWeight: "bold", color: theme.textDark, marginBottom: 10 }}>Who takes her out most?</div>
            {allUids.map(uid => {
              const u = users[uid];
              const count = pottyByUser[uid] || 0;
              const total = Math.max(Object.values(pottyByUser).reduce((a,b)=>a+b,0), 1);
              return (
                <div key={uid} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                  <div style={{ width: 28, height: 28, borderRadius: "50%", background: u.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0 }}>{u.avatar}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                      <span style={{ fontSize: 11, fontWeight: "bold", color: theme.textDark }}>{uid === userId ? "You" : u.name}</span>
                      <span style={{ fontSize: 11, color: theme.textLight }}>{count} breaks</span>

                    <div style={{ height: 8, background: theme.tabBg, borderRadius: 4, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${(count/total)*100}%`, background: u.color, borderRadius: 4 }} />
                    </div>
                  </div>
                </div>

        </>)}

        {/* ── FEEDING ── */}

                <div style={{ fontSize: 22, fontWeight: "bold", color: theme.accent }}>{s.value}</div>
                <div style={{ fontSize: 10, color: theme.textLight, marginTop: 2 }}>{s.label}</div>
              </div>

          </div>

          <div style={{ background: theme.cardBg, borderRadius: 14, padding: "14px", marginBottom: 14, border: `1.5px solid ${theme.border}` }}>
            <div style={{ fontSize: 12, fontWeight: "bold", color: theme.textDark, marginBottom: 10 }}>Meals logged per day (30d)</div>
            <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: BAR_H }}>
              {feedByDay.map(({ ds, meals }, i) => (
                <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end", height: "100%" }}>
                  <div style={{ width: "100%", background: meals >= 3 ? "#7cb87c" : meals > 0 ? "#e8c45c" : theme.border, borderRadius: 3, height: Math.max(2, (meals / maxMeals) * BAR_H) }} />
                </div>
              ))}
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
              <span style={{ fontSize: 9, color: theme.textLight }}>{shortDate(days30[0])}</span>
              <span style={{ fontSize: 9, color: theme.textLight }}>Today</span>
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
              {[["#7cb87c","All 3 meals"],["#e8c45c","1-2 meals"],[theme.border,"None"]].map(([c,l]) => (
                <div key={l} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <div style={{ width: 8, height: 8, borderRadius: 2, background: c }} />
                  <span style={{ fontSize: 9, color: theme.textLight }}>{l}</span>

              ))}
            </div>
          </div>

          <div style={{ background: theme.cardBg, borderRadius: 14, padding: "14px", marginBottom: 14, border: `1.5px solid ${theme.border}` }}>
            <div style={{ fontSize: 12, fontWeight: "bold", color: theme.textDark, marginBottom: 4 }}>When does she typically eat?</div>
            <div style={{ fontSize: 10, color: theme.textLight, marginBottom: 10 }}>Based on logged meal times (30d)</div>
            {totalMealTimed === 0 ? (
              <div style={{ fontSize: 11, color: theme.textLight, fontStyle: "italic" }}>No meal times logged yet — tap to add a time when logging each meal.</div>

              {Object.entries(mealTimeBuckets).map(([label, count]) => (
                <div key={label} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                  <div style={{ fontSize: 10, color: theme.textMid, width: 72, flexShrink: 0 }}>{label}</div>
                  <div style={{ flex: 1, height: 14, background: theme.tabBg, borderRadius: 4, overflow: "hidden" }}>
                    <div style={{ height: "100%", width: `${(count / maxMealBucket) * 100}%`, background: barColor, borderRadius: 4, transition: "width 0.3s" }} />
                  </div>
                  <div style={{ fontSize: 10, color: theme.textLight, width: 18, textAlign: "right" }}>{count}</div>

              {/* Average time per meal slot */}
              <div style={{ marginTop: 12, borderTop: `1px solid ${theme.border}`, paddingTop: 10 }}>
                <div style={{ fontSize: 11, fontWeight: "bold", color: theme.textDark, marginBottom: 8 }}>Average time per meal</div>
                <div style={{ display: "flex", gap: 8 }}>
                  {mealSlotNames.map((name, i) => (
                    <div key={i} style={{ flex: 1, background: theme.tabBg, borderRadius: 10, padding: "8px 6px", textAlign: "center" }}>
                      <div style={{ fontSize: 16, fontWeight: "bold", color: avgMealTime[i] ? barColor : theme.textLight }}>

                    </div>

              </div>

          <div style={{ background: theme.cardBg, borderRadius: 14, padding: "14px", border: `1.5px solid ${theme.border}` }}>
            <div style={{ fontSize: 12, fontWeight: "bold", color: theme.textDark, marginBottom: 10 }}>Who feeds her most?</div>
            {allUids.map(uid => {
              const u = users[uid];
              const count = feedByUser[uid] || 0;
              const total = Math.max(Object.values(feedByUser).reduce((a,b)=>a+b,0), 1);
              return (
                <div key={uid} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                  <div style={{ width: 28, height: 28, borderRadius: "50%", background: u.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0 }}>{u.avatar}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                      <span style={{ fontSize: 11, fontWeight: "bold", color: theme.textDark }}>{uid === userId ? "You" : u.name}</span>
                      <span style={{ fontSize: 11, color: theme.textLight }}>{count} meals</span>

                    <div style={{ height: 8, background: theme.tabBg, borderRadius: 4, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${(count/total)*100}%`, background: u.color, borderRadius: 4 }} />
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </>)}

          <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>

              { label: "100% streak", value: completionStreak + "d" },
              { label: "Best (30d)", value: Math.max(...completionByDay.map(d => d.pct)) + "%" },

                <div style={{ fontSize: 10, color: theme.textLight, marginTop: 2 }}>{s.label}</div>

          <div style={{ background: theme.cardBg, borderRadius: 14, padding: "14px", marginBottom: 14, border: `1.5px solid ${theme.border}` }}>

            <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: BAR_H }}>
              {completionByDay.map(({ ds, pct }, i) => (
