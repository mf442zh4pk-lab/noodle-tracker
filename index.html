<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Test</title>
</head>
<body>
  <div id="root"><p>HTML works</p></div>
  <script type="module">
    import React from "https://esm.sh/react@18.2.0";
    import { createRoot } from "https://esm.sh/react-dom@18.2.0/client";
    
    document.getElementById("root").innerHTML = "<p style='color:green'>Script loaded!</p>";
    
    const App = () => React.createElement("h1", null, "Hello Noodle!");
    createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
