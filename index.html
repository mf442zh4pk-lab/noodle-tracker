<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3d2b1f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Noodle" />
    <title>Noodle Tracker</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: Georgia, serif; background: #fdf6ec; }
    </style>
  </head>
  <body>
  <div id="root"></div>
  <div id="err" style="display:none;padding:20px;color:red;font:14px monospace;white-space:pre-wrap"></div>
  <script>
    window.onerror = function(m,s,l,c,e) {
      document.getElementById("err").style.display = "block";
      document.getElementById("err").textContent = m + "\nLine: " + l + "\n" + (e&&e.stack||"");
    };
    window.onunhandledrejection = function(e) {
      document.getElementById("err").style.display = "block";
      document.getElementById("err").textContent = String(e.reason&&e.reason.stack||e.reason);
    };
  </script>
  <script type="module" src="/main.jsx"></script>
</body>

</html>
